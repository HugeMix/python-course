<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задачи Python</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <style>
        .tasks-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .tasks-sidebar {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
        }

        .task-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
            background: rgba(0,0,0,0.02);
        }

        body.dark-mode .task-item {
            background: rgba(255,255,255,0.03);
            border-color: rgba(255,255,255,0.05);
        }

        .task-item:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        .task-item.active {
            border-color: var(--accent-color);
            background: rgba(79, 70, 229, 0.15);
        }

        .task-difficulty {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .diff-easy { color: var(--success-color); }
        .diff-medium { color: #f59e0b; }
        .diff-hard { color: #ef4444; }

        .editor-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #282a36;
        }

        .editor-header {
            padding: 15px 20px;
            background: #1e1f29;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-submit {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .test-results {
            margin-top: 20px;
            padding: 20px;
            background: #1e1f29;
            color: #f8f8f2;
            border-radius: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            min-height: 100px;
        }

        @media (max-width: 900px) {
            .tasks-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="logo.png" alt="Логотип" class="logo" style="height: 40px;">
                <span style="font-weight: 800; font-size: 1.4rem; margin-left: 12px; color: var(--text-color);">Python<span style="color: var(--accent-color);">Basic</span></span>
            </a>
            <nav>
                <ul style="display: flex; list-style: none; margin: 0; padding: 0; gap: 15px; align-items: center;">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="python-basic.html">Курс</a></li>
                    <li><a href="libraries.html">Библиотеки</a></li>
                    <li><a href="tasks.html" class="active">Задачи</a></li>
                    <li><a href="python-online.html">Python Online</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="lesson-title" style="padding: 40px 0; text-align: center;">
            <h2>Практические задачи</h2>
            <p>Закрепите теорию на практике с автоматической проверкой.</p>
        </section>

        <div class="tasks-layout">
            <aside class="tasks-sidebar" id="tasks-list"></aside>
            <div class="tasks-main">
                <div id="task-desc" style="background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow);">
                    <h3 id="task-title" style="margin-top:0;">Выберите задачу</h3>
                    <div id="task-text">Загрузка...</div>
                </div>

                <div class="editor-container">
                    <div class="editor-header">
                        <span>Редактор кода</span>
                        <button id="btn-submit" class="btn-submit" disabled>Загрузка Python...</button>
                    </div>
                    <textarea id="code-editor"></textarea>
                </div>

                <div id="test-results" class="test-results">Результаты появятся здесь...</div>
            </div>
        </div>
    </main>

    <script src="tasks_data.js"></script>
    <script>
        let currentTaskIndex = 0;
        let pyodideInstance = null;

        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            indentUnit: 4
        });
        editor.setSize("100%", "350px");

        async function initPython() {
            try {
                pyodideInstance = await loadPyodide();
                const btn = document.getElementById('btn-submit');
                btn.textContent = '▶ Проверить решение';
                btn.disabled = false;
            } catch (e) {
                document.getElementById('test-results').textContent = "Ошибка загрузки Python";
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasks-list');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const div = document.createElement('div');
                div.className = `task-item ${index === currentTaskIndex ? 'active' : ''}`;
                const diff = task.difficulty === 'easy' ? '🟢 Легко' : (task.difficulty === 'medium' ? '🟡 Средне' : '🔴 Сложно');
                const diffClass = `diff-${task.difficulty}`;
                div.innerHTML = `<span class="task-difficulty ${diffClass}">${diff}</span><div style="font-weight:700;">${task.title}</div>`;
                div.onclick = () => selectTask(index);
                list.appendChild(div);
            });
        }

        function selectTask(index) {
            currentTaskIndex = index;
            const task = tasks[index];
            document.getElementById('task-title').textContent = task.title;
            document.getElementById('task-text').innerHTML = task.desc;
            editor.setValue(task.startCode);
            renderTasks();
        }

        document.getElementById('btn-submit').onclick = async () => {
            const results = document.getElementById('test-results');
            results.textContent = "🤖 Проверка...";
            results.style.color = "white";
            
            try {
                let output = "";
                pyodideInstance.setStdout({ batched: (str) => output += str + "\n" });
                const fullCode = editor.getValue() + "\n\n" + tasks[currentTaskIndex].testCode;
                await pyodideInstance.runPythonAsync(fullCode);
                results.textContent = output;
                results.style.color = output.includes("✅") ? "#10b981" : "#ef4444";
            } catch (err) {
                results.textContent = "❌ Ошибка:\n" + err;
                results.style.color = "#ef4444";
            }
        };

        initPython();
        renderTasks();
        selectTask(0);
    </script>
    <script src="script.js"></script>
</body>
</html>
